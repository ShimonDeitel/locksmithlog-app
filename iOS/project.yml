name: LocksmithLog
options:
  bundleIdPrefix: com.shimondeitel.locksmithlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  LocksmithLog:
    type: application
    platform: iOS
    sources:
      - path: LocksmithLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.locksmithlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: LocksmithLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LocksmithLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LocksmithLogTests
      - path: LocksmithLog.storekit
    dependencies:
      - target: LocksmithLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.locksmithlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LocksmithLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LocksmithLogUITests
    dependencies:
      - target: LocksmithLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.locksmithlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  LocksmithLog:
    build:
      targets:
        LocksmithLog: all
        LocksmithLogTests: [test]
        LocksmithLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: LocksmithLog.storekit
    test:
      config: Debug
      storeKitConfiguration: LocksmithLog.storekit
      targets:
        - LocksmithLogTests
        - LocksmithLogUITests
    archive:
      config: Release
